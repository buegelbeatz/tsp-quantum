name: quality-gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  required-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce workflow-code-debt monotonic gate
        run: make workflow-code-debt

      - name: Enforce stage completion report gate
        run: make stage-completion-gate
