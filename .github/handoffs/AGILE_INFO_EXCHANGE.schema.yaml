layer: digital-generic-team
schema: agile_info_exchange_v1
$schema: https://json-schema.org/draft/2020-12/schema
title: Agile Info Exchange Handoff v1
type: object
additionalProperties: false
required:
  - schema
  - exchange_id
  - from_role
  - to_role
  - direction
  - intent
  - requested_domain
  - current_state
  - expected_outputs
  - completion_criteria
  - assumptions
  - open_questions
  - artifacts
properties:
  schema:
    type: string
    const: agile_info_exchange_v1
  exchange_id:
    type: string
    minLength: 3
  from_role:
    type: string
    minLength: 2
  to_role:
    type: string
    minLength: 2
  direction:
    type: string
    enum:
      - request_to_agile_coach
      - response_from_agile_coach
  intent:
    type: string
    minLength: 10
  requested_domain:
    type: string
    enum:
      - board
      - wiki
      - board_and_wiki
  current_state:
    oneOf:
      - type: object
      - type: string
    description: Factual status evidence only.
  expected_outputs:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  completion_criteria:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  assumptions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  open_questions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  artifacts:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  constraints:
    type: array
    items:
      type: string
