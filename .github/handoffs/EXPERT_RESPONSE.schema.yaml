layer: digital-generic-team
schema: expert_response_v1
$schema: https://json-schema.org/draft/2020-12/schema
title: Expert Response Handoff v1
type: object
additionalProperties: false
required:
  - schema
  - request_id
  - from_role
  - to_role
  - summary
  - recommendations
  - assumptions
  - open_questions
  - artifacts
properties:
  schema:
    type: string
    const: expert_response_v1
  request_id:
    type: string
    minLength: 3
  from_role:
    type: string
    minLength: 2
  to_role:
    type: string
    minLength: 2
  summary:
    type: string
    minLength: 10
  confidence:
    type: string
    enum: [low, medium, high]
  recommendations:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  risks:
    type: array
    items:
      type: string
  assumptions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  open_questions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  artifacts:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
