layer: digital-generic-team
schema: expert_request_v1
$schema: https://json-schema.org/draft/2020-12/schema
title: Expert Request Handoff v1
type: object
additionalProperties: false
required:
  - schema
  - request_id
  - from_role
  - to_role
  - goal
  - current_state
  - context
  - assumptions
  - open_questions
  - artifacts
properties:
  schema:
    type: string
    const: expert_request_v1
  request_id:
    type: string
    minLength: 3
  from_role:
    type: string
    minLength: 2
  to_role:
    type: string
    minLength: 2
  goal:
    type: string
    minLength: 10
  current_state:
    oneOf:
      - type: object
      - type: string
    description: Factual current-state evidence only.
  context:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  assumptions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  open_questions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  artifacts:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  constraints:
    type: array
    items:
      type: string
  due_by:
    type: string
    format: date-time
