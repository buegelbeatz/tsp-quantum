layer: digital-generic-team
schema: work_handoff_v1
$schema: https://json-schema.org/draft/2020-12/schema
title: Work Handoff v1
type: object
additionalProperties: false
required:
  - schema
  - handoff_id
  - from_role
  - to_role
  - goal
  - current_state
  - assumptions
  - open_questions
  - artifacts
properties:
  schema:
    type: string
    const: work_handoff_v1
  handoff_id:
    type: string
    minLength: 3
  from_role:
    type: string
    minLength: 2
  to_role:
    type: string
    minLength: 2
  goal:
    type: string
    minLength: 10
  current_state:
    oneOf:
      - type: object
      - type: string
    description: Factual delivery status and completed work evidence.
  expected_outputs:
    type: array
    items:
      type: string
      minLength: 1
  completion_criteria:
    type: array
    items:
      type: string
      minLength: 1
  completed_items:
    type: array
    items:
      type: string
  remaining_items:
    type: array
    items:
      type: string
  assumptions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  open_questions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  artifacts:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  definition_of_done:
    type: array
    items:
      type: string
